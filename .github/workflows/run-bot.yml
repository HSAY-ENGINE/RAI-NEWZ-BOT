name: RAI NEWZ BOT

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install libraries
      run: |
        pip install feedparser requests google-genai python-dotenv schedule

    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python bot.py

    - name: Save seen.txt to repo
      run: |
        git config --global user.email "yash.in.flow@gmail.com"
        git config --global user.name "HSAY-ENGINE"
        git add -f seen.txt
        git diff --staged --quiet || git commit -m "Update seen.txt"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}